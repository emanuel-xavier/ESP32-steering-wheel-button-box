name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build desktop app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            gcc-mingw-w64-x86-64

      - name: Build Linux binary
        working-directory: desktop
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o build/buttonbox-config-linux-amd64 .

      - name: Build Windows binary
        working-directory: desktop
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
            go build -ldflags="-s -w -H windowsgui" -o build/buttonbox-config-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/build/buttonbox-config-linux-amd64
            desktop/build/buttonbox-config-windows-amd64.exe
          generate_release_notes: true
