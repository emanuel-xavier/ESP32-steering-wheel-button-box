name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # webview_go hardcodes webkit2gtk-4.0 in its pkg-config directive;
          # symlink the 4.1 .pc file so the old name resolves on Ubuntu 24.04.
          sudo ln -sf \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Build
        working-directory: desktop
        run: |
          mkdir -p build
          CGO_ENABLED=1 go build -ldflags="-s -w" -o build/buttonbox-config-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: desktop/build/buttonbox-config-linux-amd64

  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install MinGW-w64
        uses: ilammy/setup-mingw@v1
        with:
          platform: x64

      - name: Build
        working-directory: desktop
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p build
          go build -ldflags="-s -w -H windowsgui" -o build/buttonbox-config-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: desktop/build/buttonbox-config-windows-amd64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/buttonbox-config-linux-amd64
            dist/buttonbox-config-windows-amd64.exe
          generate_release_notes: true
