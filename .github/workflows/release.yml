name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build desktop app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            gcc-mingw-w64-x86-64
          # webview_go hardcodes webkit2gtk-4.0 in its pkg-config directive;
          # symlink the 4.1 .pc file so the old name resolves on Ubuntu 24.04.
          sudo ln -sf \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Build Linux binary
        working-directory: desktop
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o build/buttonbox-config-linux-amd64 .

      - name: Create mingw C++ wrapper (strips -mthreads, dropped by GCC 9+)
        run: |
          cat << 'WRAPPER' | sudo tee /usr/local/bin/x86_64-w64-mingw32-g++-wrap > /dev/null
          #!/bin/bash
          args=()
          for arg in "$@"; do
            [ "$arg" != "-mthreads" ] && args+=("$arg")
          done
          exec /usr/bin/x86_64-w64-mingw32-g++ "${args[@]}"
          WRAPPER
          sudo chmod +x /usr/local/bin/x86_64-w64-mingw32-g++-wrap

      - name: Build Windows binary
        working-directory: desktop
        run: |
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            CC=x86_64-w64-mingw32-gcc \
            CXX=/usr/local/bin/x86_64-w64-mingw32-g++-wrap \
            go build -ldflags="-s -w -H windowsgui" -o build/buttonbox-config-windows-amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/build/buttonbox-config-linux-amd64
            desktop/build/buttonbox-config-windows-amd64.exe
          generate_release_notes: true
